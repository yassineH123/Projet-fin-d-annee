<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C1272D"/>
      <stop offset="100%" stop-color="#8B1820"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4890A"/>
      <stop offset="50%" stop-color="#F5AA20"/>
      <stop offset="100%" stop-color="#D4890A"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Thin outer gold frame -->
  <rect x="3.5" y="3.5" width="93" height="93" rx="19.5" fill="none" stroke="#D4890A" stroke-width="1" opacity="0.7"/>

  <!-- Moroccan 8-pointed star (khatam) — geometric zellige motif -->
  <!-- Outer R=38, inner r=20, center (50,50) -->
  <path d="M50,12 L57.65,31.52 L76.87,23.13 L68.48,42.35 L88,50
           L68.48,57.65 L76.87,76.87 L57.65,68.48 L50,88
           L42.35,68.48 L23.13,76.87 L31.52,57.65 L12,50
           L31.52,42.35 L23.13,23.13 L42.35,31.52 Z"
        fill="rgba(212,137,10,0.10)" stroke="#D4890A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Atlas mountains silhouette (3 peaks) -->
  <path d="M14,73 L32,43 L42,57 L50,37 L58,57 L68,43 L86,73 Z"
        fill="url(#mountainGrad)"/>

  <!-- Snow-cap accents on left and right peaks (subtle red shadow) -->
  <path d="M32,43 L39,55 L25,55 Z" fill="#C1272D" opacity="0.18"/>
  <path d="M68,43 L75,55 L61,55 Z" fill="#C1272D" opacity="0.18"/>

  <!-- Centre peak snow cap highlight -->
  <path d="M50,37 L55,48 L45,48 Z" fill="#D4890A" opacity="0.35"/>

  <!-- Location pin on central peak -->
  <circle cx="50" cy="33" r="4.5" fill="#D4890A"/>
  <circle cx="50" cy="33" r="2.8" fill="white"/>
  <line x1="50" y1="33" x2="50" y2="39" stroke="#D4890A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Road / route curve (Moroccan arch shape) -->
  <path d="M13,77 Q50,68.5 87,77"
        stroke="url(#roadGrad)" stroke-width="2.5" fill="none"
        stroke-linecap="round"/>

  <!-- Dashed centre line on road (like real road markings) -->
  <path d="M32,74.8 Q50,70 68,74.8"
        stroke="white" stroke-width="0.8" fill="none"
        stroke-linecap="round" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Corner zellige micro-ornaments (top-left / top-right) -->
  <path d="M14,14 L14,20 L20,20 L20,14 Z M16,14 L16,20 M14,16 L20,16 M14,18 L20,18 M18,14 L18,20"
        stroke="#D4890A" stroke-width="0.6" fill="none" opacity="0.45"/>
  <path d="M86,14 L86,20 L80,20 L80,14 Z M84,14 L84,20 M86,16 L80,16 M86,18 L80,18 M82,14 L82,20"
        stroke="#D4890A" stroke-width="0.6" fill="none" opacity="0.45"/>
</svg>
